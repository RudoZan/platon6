<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica conmigo — Platón 6</title>
<style>
  :root {
    --color-bg-top: #cdf0f8;
    --color-bg-bottom: #c2ebf5;
    --color-primario: #235e82;
    --color-primario-claro: #4a90c2;
    --color-acento: #ef9d4f;
    --color-texto: #1f3a4d;
    --color-borde: #a9d0e2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, var(--color-bg-top), var(--color-bg-bottom));
    color: var(--color-texto);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 20px 50px;
  }
  .volver {
    align-self: flex-start; display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px 8px 12px; border-radius: 999px;
    background: #fdfbf6; border: 2px solid var(--color-borde);
    color: var(--color-primario); text-decoration: none; font-size: 0.82rem; font-weight: bold;
    margin-bottom: 30px; transition: border-color .15s, gap .15s;
  }
  .volver:hover { border-color: var(--color-acento); gap: 10px; }

  main { max-width: 560px; text-align: center; margin-top: 40px; }
  h1 {
    font-family: Georgia, 'Times New Roman', serif; font-size: 2rem;
    color: var(--color-primario); margin-bottom: 10px;
  }
  .aviso {
    color: var(--color-primario-claro); font-size: 0.9rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 24px;
  }
  p { font-size: 0.95rem; line-height: 1.6; margin-bottom: 14px; }

  .video-envoltorio {
    position: relative; width: 100%; max-width: 640px; aspect-ratio: 16 / 9;
    margin: 10px auto 24px; border-radius: 12px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(35, 94, 130, 0.25); border: 2px solid var(--color-borde);
  }
  .video-envoltorio iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
  }
</style>
</head>
<body>

  <a class="volver" href="../listado.html"><span>←</span> Volver al listado</a>

  <main>
    <h1>🥁 Práctica conmigo</h1>
    <p class="aviso">Contenido en construcción</p>
    <p>Una serie de videos para practicar batería siguiendo videos de YouTube — elige una canción,
    dale play y toca junto al video.</p>

    <div class="video-envoltorio">
      <iframe
        src="https://www.youtube.com/embed/RTe0WzYeMIs"
        title="Video de práctica de batería"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </main>

</body>
</html>
